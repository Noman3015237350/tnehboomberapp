<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TNEH BOOMER - SMS Bomber</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        .card {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 0.9em;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-size: 0.9em;
        }

        .result.show {
            display: block;
        }

        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .key-badge {
            background: #2d3748;
            color: #fff;
            padding: 10px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8em;
            word-break: break-all;
            margin: 10px 0;
        }

        .small-btn {
            background: #4a5568;
            margin-top: 10px;
            font-size: 0.9em;
            width: auto;
            padding: 8px 15px;
        }

        .dev-info {
            text-align: center;
            margin-top: 20px;
            color: #888;
            font-size: 0.8em;
        }

        .dev-info a {
            color: #ff6b6b;
            text-decoration: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            background: #f0f0f0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
        }

        .tab.active {
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            color: white;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>💣 TNEH BOOMER</h1>
                <p>SMS Bomber Tool</p>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('bomber')">💣 BOMBER</button>
                <button class="tab" onclick="switchTab('key')">🔑 GET KEY</button>
                <button class="tab" onclick="switchTab('check')">✅ CHECK KEY</button>
            </div>

            <!-- Bomber Tab -->
            <div id="bomberTab" class="tab-content active">
                <div class="input-group">
                    <label>🔑 API Key</label>
                    <input type="text" id="apiKey" placeholder="Enter your API key">
                </div>
                <div class="input-group">
                    <label>📱 Target Number</label>
                    <input type="tel" id="phoneNumber" placeholder="017XXXXXXXX">
                </div>
                <div class="input-group">
                    <label>💥 SMS Count (1-20)</label>
                    <input type="number" id="smsCount" value="10" min="1" max="20">
                </div>
                <button onclick="startBombing()">💣 START BOMBING</button>
                <div id="bombResult" class="result"></div>
            </div>

            <!-- Get Key Tab -->
            <div id="keyTab" class="tab-content">
                <button onclick="generateKey()">🔑 Generate 30-Day API Key</button>
                <div id="keyResult" class="result"></div>
            </div>

            <!-- Check Key Tab -->
            <div id="checkTab" class="tab-content">
                <div class="input-group">
                    <label>🔑 API Key</label>
                    <input type="text" id="checkKeyInput" placeholder="Enter API key">
                </div>
                <button onclick="checkKey()">✅ Check Key Status</button>
                <div id="checkResult" class="result"></div>
            </div>

            <div class="dev-info">
                <p>👨‍💻 <strong>TNEH GROUP</strong> | 📱 <a href="https://t.me/tneh_owner" target="_blank">@tneh_owner</a></p>
                <p>⚠️ For educational purposes only</p>
            </div>
        </div>
    </div>

    <script>
        // Use relative URL or current domain
        const API_BASE = window.location.origin;

        function switchTab(tab) {
            // Update tabs
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (tab === 'bomber') document.querySelector('.tab:first-child').classList.add('active');
            else if (tab === 'key') document.querySelectorAll('.tab')[1].classList.add('active');
            else document.querySelectorAll('.tab')[2].classList.add('active');

            // Update content
            document.getElementById('bomberTab').classList.remove('active');
            document.getElementById('keyTab').classList.remove('active');
            document.getElementById('checkTab').classList.remove('active');
            document.getElementById(tab + 'Tab').classList.add('active');
        }

        async function generateKey() {
            const resultDiv = document.getElementById('keyResult');
            resultDiv.innerHTML = '<div class="info">⏳ Generating key...</div>';
            resultDiv.classList.add('show');
            
            try {
                const response = await fetch(`${API_BASE}/api/expiredate=30&createkey`);
                const data = await response.json();
                
                console.log('Key generation response:', data);
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <strong>✅ Key Generated Successfully!</strong>
                            <div class="key-badge">${data.api_key}</div>
                            <strong>📅 Valid for:</strong> ${data.valid_days} days<br>
                            <strong>⏰ Expires:</strong> ${new Date(data.expiry_date).toLocaleString()}
                            <button class="small-btn" onclick="copyKey('${data.api_key}')">📋 Copy Key</button>
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ ${data.error || 'Failed to generate key'}</div>`;
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<div class="error">❌ Connection error: ${error.message}<br>Make sure the server is running</div>`;
            }
        }

        async function checkKey() {
            const key = document.getElementById('checkKeyInput').value;
            const resultDiv = document.getElementById('checkResult');
            
            if (!key) {
                resultDiv.innerHTML = `<div class="error">❌ Please enter API key</div>`;
                resultDiv.classList.add('show');
                return;
            }
            
            resultDiv.innerHTML = '<div class="info">⏳ Checking key status...</div>';
            resultDiv.classList.add('show');
            
            try {
                const response = await fetch(`${API_BASE}/api/checkkey?key=${key}`);
                const data = await response.json();
                
                console.log('Check key response:', data);
                
                if (data.valid) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <strong>✅ Key is VALID</strong><br>
                            <strong>📅 Expires:</strong> ${new Date(data.expiry_date).toLocaleString()}<br>
                            <strong>Status:</strong> ${data.status}
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ Key is INVALID or EXPIRED</div>`;
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<div class="error">❌ Connection error: ${error.message}</div>`;
            }
        }

        async function startBombing() {
            const key = document.getElementById('apiKey').value;
            const number = document.getElementById('phoneNumber').value;
            const count = document.getElementById('smsCount').value;
            const resultDiv = document.getElementById('bombResult');
            
            if (!key) {
                resultDiv.innerHTML = `<div class="error">❌ Please enter API Key</div>`;
                resultDiv.classList.add('show');
                return;
            }
            
            if (!number) {
                resultDiv.innerHTML = `<div class="error">❌ Please enter target number</div>`;
                resultDiv.classList.add('show');
                return;
            }
            
            resultDiv.innerHTML = '<div class="info">⏳ Sending SMS bombs... Please wait...</div>';
            resultDiv.classList.add('show');
            
            try {
                const response = await fetch(`${API_BASE}/api/spam?key=${key}&number=${number}&count=${count}`);
                const data = await response.json();
                
                console.log('Bombing response:', data);
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <strong>✅ Bombing Complete!</strong><br>
                            📱 Target: ${data.target_number}<br>
                            💥 Total Sent: ${data.total_requests_sent}<br>
                            ✅ Successful: ${data.successful_requests}<br>
                            ❌ Failed: ${data.failed_requests}
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `<div class="error">❌ ${data.error}</div>`;
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.innerHTML = `<div class="error">❌ Connection error: ${error.message}</div>`;
            }
        }

        function copyKey(key) {
            navigator.clipboard.writeText(key);
            alert('✅ API Key copied to clipboard!');
        }
    </script>
</body>
</html>
